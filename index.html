<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威漢國際物流系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="bg-blue-600 p-4 text-white flex items-center shadow-lg">
        <img id="userPicture" class="w-12 h-12 rounded-full border-2 border-white mr-3" src="https://via.placeholder.com/50" alt="Avatar">
        <div>
            <p class="text-sm opacity-80">歡迎回來</p>
            <h2 id="userName" class="font-bold text-lg text-white">載入中...</h2>
        </div>
    </div>

    <div class="p-4">
        <div class="bg-white rounded-xl shadow p-4 mb-4">
            <h3 class="text-gray-500 text-sm mb-2">📦 最新運單：WH2026033001</h3>
            <div class="flex justify-between items-center mt-4">
                <div class="text-center w-1/4">
                    <div class="w-3 h-3 bg-blue-500 rounded-full mx-auto mb-1"></div>
                    <p class="text-xs">海外倉</p>
                </div>
                <div class="h-1 bg-blue-500 flex-1"></div>
                <div class="text-center w-1/4">
                    <div class="w-3 h-3 bg-blue-500 rounded-full mx-auto mb-1"></div>
                    <p class="text-xs">清關中</p>
                </div>
                <div class="h-1 bg-gray-300 flex-1"></div>
                <div class="text-center w-1/4">
                    <div class="w-3 h-3 bg-gray-300 rounded-full mx-auto mb-1"></div>
                    <p class="text-xs">配送中</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="scanCode()" class="bg-white p-6 rounded-xl shadow text-center hover:bg-gray-50">
                <span class="text-3xl">📷</span>
                <p class="mt-2 text-gray-700 font-medium">掃碼入庫</p>
            </button>
            <button class="bg-white p-6 rounded-xl shadow text-center hover:bg-gray-50">
                <span class="text-3xl">📋</span>
                <p class="mt-2 text-gray-700 font-medium">我的訂單</p>
            </button>
        </div>
    </div>

    <script>
        // 初始化 LINE LIFF
        async function main() {
            await liff.init({ liffId: "您的_LIFF_ID" }); 
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = profile.displayName;
                document.getElementById('userPicture').src = profile.pictureUrl;
            } else {
                liff.login();
            }
        }

        function scanCode() {
            // 呼叫 LINE 原生掃碼器
            liff.scanCodeV2().then(result => {
                alert("掃描成功，單號為: " + result.value);
            });
        }

        main();
    </script>
</body>
</html>
